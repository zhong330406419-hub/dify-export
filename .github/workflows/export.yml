name: Push Dify Images to ECS
on:
  workflow_dispatch
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and save individually
        run: |
          set +e
          mkdir -p /tmp/imgs
          for img in langgenius/dify-api:1.14.2 langgenius/dify-web:1.14.2 langgenius/dify-sandbox:0.2.15 langgenius/dify-plugin-daemon:0.6.1-local nginx:1.25-alpine mysql:8.0 redis:6-alpine ubuntu/squid:latest certbot/certbot:latest semitechnologies/weaviate:1.27.0 postgres:15-alpine busybox:latest; do
            docker pull $img
            safe=$(echo $img | tr '/:' '__')
            docker save -o /tmp/imgs/${safe}.tar $img
          done
          ls -la /tmp/imgs/
      - name: Pack into one tar
        run: |
          cd /tmp/imgs
          tar -cf /tmp/dify-images-bundle.tar *.tar
          ls -lh /tmp/dify-images-bundle.tar
      - name: Copy bundle to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "/tmp/dify-images-bundle.tar"
          target: "/tmp/dify-images-bundle.tar"
      - name: Unpack and load on ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set +e
            cd /tmp
            mkdir -p imgs
            cd imgs
            tar -xf /tmp/dify-images-bundle.tar
            rm -f /tmp/dify-images-bundle.tar
            for f in *.tar; do
              echo "=== Loading $f ==="
              docker load -i $f
            done
            docker images
