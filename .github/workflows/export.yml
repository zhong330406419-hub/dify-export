name: Export Dify Images
on:
  workflow_dispatch

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Pull and save images
        run: |
          docker pull langgenius/dify-api:1.14.2
          docker pull langgenius/dify-web:1.14.2
          docker pull langgenius/dify-sandbox:0.2.15
          docker pull langgenius/dify-plugin-daemon:0.6.1-local
          docker pull nginx:1.25-alpine
          docker pull mysql:8.0
          docker pull redis:6-alpine
          docker pull ubuntu/squid:latest
          docker pull certbot/certbot:latest
          docker pull semitechnologies/weaviate:1.27.0
          docker pull postgres:15-alpine
          docker pull busybox:latest
          
          # 合并所有镜像到一个 tar
          docker save -o dify-images.tar \
            langgenius/dify-api:1.14.2 \
            langgenius/dify-web:1.14.2 \
            langgenius/dify-sandbox:0.2.15 \
            langgenius/dify-plugin-daemon:0.6.1-local \
            nginx:1.25-alpine \
            mysql:8.0 \
            redis:6-alpine \
            ubuntu/squid:latest \
            certbot/certbot:latest \
            semitechnologies/weaviate:1.27.0 \
            postgres:15-alpine \
            busybox:latest
          
          ls -lh dify-images.tar
          echo "==TAR_READY=="
      
      - name: Push to GHCR as single image
        run: |
          # 登录 GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 把所有镜像塞进一个大镜像的不同 tag
          # 先建 Dockerfile 把 tar 复制进去
          mkdir -p /tmp/difyimg
          cp dify-images.tar /tmp/difyimg/
          
          cat > /tmp/difyimg/Dockerfile << 'EOF'
          FROM scratch
          COPY dify-images.tar /dify-images.tar
          EOF
          
          # 推送为单一镜像
          cd /tmp/difyimg
          docker build -t ghcr.io/${{ github.actor }}/dify-images:latest .
          docker push ghcr.io/${{ github.actor }}/dify-images:latest
          
          echo "==PUSHED=="
          echo "Image: ghcr.io/${{ github.actor }}/dify-images:latest"
