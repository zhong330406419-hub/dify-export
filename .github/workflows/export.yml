name: Push Dify Images to ECS
on:
  workflow_dispatch
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and save images
        run: |
          docker pull langgenius/dify-api:1.14.2 || true
          docker pull langgenius/dify-web:1.14.2 || true
          docker pull langgenius/dify-sandbox:0.2.15 || true
          docker pull langgenius/dify-plugin-daemon:0.6.1-local || true
          docker pull nginx:1.25-alpine || true
          docker pull mysql:8.0 || true
          docker pull redis:6-alpine || true
          docker pull ubuntu/squid:latest || true
          docker pull certbot/certbot:latest || true
          docker pull semitechnologies/weaviate:1.27.0 || true
          docker pull postgres:15-alpine || true
          docker pull busybox:latest || true
          docker save -o /tmp/dify-images.tar $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'langgenius|nginx|mysql|redis|ubuntu|certbot|semitechnologies|postgres|busybox' | tr '\n' ' ')
          ls -lh /tmp/dify-images.tar
      - name: Copy tar to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "/tmp/dify-images.tar"
          target: "/tmp/dify-images.tar"
      - name: Load images on ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            docker load -i /tmp/dify-images.tar
            docker images | head -30
