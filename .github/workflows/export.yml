name: Push Dify Images to ECS
on:
  workflow_dispatch
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and save
        run: |
          set +e
          mkdir -p /tmp/imgs
          for img in langgenius/dify-api:1.14.2 langgenius/dify-web:1.14.2 langgenius/dify-sandbox:0.2.15 langgenius/dify-plugin-daemon:0.6.1-local nginx:1.25-alpine mysql:8.0 redis:6-alpine ubuntu/squid:latest certbot/certbot:latest semitechnologies/weaviate:1.27.0 postgres:15-alpine busybox:latest; do
            docker pull $img
            safe=$(echo $img | tr '/:' '__')
            docker save -o /tmp/imgs/${safe}.tar $img
          done
          cd /tmp/imgs
          tar -cf /tmp/dify-images-bundle.tar *.tar
          ls -lh /tmp/dify-images-bundle.tar
      - name: Install sshpass and scp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass openssh-client
      - name: Push private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/ecs_key
          chmod 600 ~/.ssh/ecs_key
      - name: Copy to ECS via scp
        run: |
          scp -i ~/.ssh/ecs_key -o StrictHostKeyChecking=no /tmp/dify-images-bundle.tar ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/tmp/dify-images-bundle.tar
      - name: Unpack and load on ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set +e
            cd /tmp
            mkdir -p imgs
            tar -xf /tmp/dify-images-bundle.tar -C /tmp/imgs
            cd /tmp/imgs
            for f in *.tar; do
              echo "=== Loading $f ==="
              docker load -i $f
            done
            rm -f /tmp/dify-images-bundle.tar
            echo "=== Final ==="
            docker images
